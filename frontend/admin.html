<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <a href="index.html" class="admin-link">Home</a>

  <main class="container">
    <h1>Admin Dashboard</h1>

    <section class="hotel-card">
      <h2>Block Room Dates</h2>

      <div class="booking-form">
        <label for="hotelSelect">Hotel:</label>
        <select id="hotelSelect"></select>

        <label for="roomSelect">Room:</label>
        <select id="roomSelect"></select>

        <label for="startDate">Start date:</label>
        <input id="startDate" type="date" />

        <label for="endDate">End date:</label>
        <input id="endDate" type="date" />

        <label for="reason">Reason:</label>
        <input id="reason" type="text" placeholder="Maintenance, private use, etc." />

        <button id="blockBtn" type="button">Block Dates</button>
        <p id="blockMessage" class="msg"></p>
      </div>
    </section>

    <section class="hotel-card">
      <h2>Blocked Dates</h2>
      <div id="blockList"></div>
    </section>

    <section class="hotel-card">
      <h2>Reservations</h2>
      <div id="reservationList"></div>
    </section>
  </main>

  <script src="admin.js"></script>
</body>
</html>
